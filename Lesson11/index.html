<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouse & Accounting System</title>
  <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
</head>
<body>

<div class="container grid-lg">
  <header class="navbar">
    <section class="navbar-section">
      <a href="/" class="navbar-brand mr-2">Dashboard</a>
      <a href="/history" class="btn btn-link">History</a>
    </section>
  </header>

  <!-- MAIN DASHBOARD -->
  <div class="columns">
    <div class="column col-6">
      <div class="card">
        <div class="card-header">
          <div class="card-title h5">Current Stock</div>
        </div>
        <div class="card-body">
          <p id="stock-value">0 items</p>
        </div>
      </div>
    </div>

    <div class="column col-6">
      <div class="card">
        <div class="card-header">
          <div class="card-title h5">Account Balance</div>
        </div>
        <div class="card-body">
          <p id="balance-value">€0.00</p>
        </div>
      </div>
    </div>
  </div>

  <!-- NAV BUTTONS -->
  <div class="columns mt-2">
    <div class="column col-4">
      <a href="/purchase" class="btn btn-primary btn-block">Purchase</a>
    </div>
    <div class="column col-4">
      <a href="/sale" class="btn btn-success btn-block">Sale</a>
    </div>
    <div class="column col-4">
      <a href="/balance" class="btn btn-error btn-block">Change Balance</a>
    </div>
  </div>
</div>

<!-- PURCHASE FORM -->
<div class="container grid-lg mt-2">
  <h4>Purchase</h4>
  <form action="/purchase" method="POST">
    <div class="form-group">
      <label>Product Name</label>
      <input class="form-input" type="text" name="product" required>
    </div>

    <div class="form-group">
      <label>Unit Price</label>
      <input class="form-input" type="number" step="0.01" name="price" required>
    </div>

    <div class="form-group">
      <label>Quantity</label>
      <input class="form-input" type="number" name="quantity" required>
    </div>

    <button class="btn btn-primary" type="submit">Submit</button>
  </form>
</div>

<!-- SALE FORM -->
<div class="container grid-lg mt-2">
  <h4>Sale</h4>
  <form action="/sale" method="POST">
    <div class="form-group">
      <label>Product Name</label>
</html>
